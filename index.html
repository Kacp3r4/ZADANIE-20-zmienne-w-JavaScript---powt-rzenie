<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kalkulator zadań</h1>

<div class="section">
    <h2>Suma i średnia</h2>
    <input id="a1" type="number">
    <input id="a2" type="number">
    <input id="a3" type="number">
    <button onclick="sumaSrednia()">Oblicz</button>
    <div id="wynik1"></div>
</div>

<div class="section">
    <h2>Operacje</h2>
    <input id="b1" type="number">
    <input id="b2" type="number">
    <button onclick="operacje()">Oblicz</button>
    <div id="wynik2"></div>
</div>

<div class="section">
    <h2>Pierwiastek</h2>
    <input id="c1" type="number">
    <button onclick="pierwiastek()">Oblicz</button>
    <div id="wynik3"></div>
</div>

<div class="section">
    <h2>Pole kwadratu</h2>
    <input id="d1" type="number">
    <button onclick="kwadrat()">Oblicz</button>
    <div id="wynik4"></div>
</div>

<div class="section">
    <h2>Prostopadłościan</h2>
    <input id="e1" type="number">
    <input id="e2" type="number">
    <input id="e3" type="number">
    <button onclick="prostopadloscian()">Oblicz</button>
    <div id="wynik5"></div>
</div>

<div class="section">
    <h2>Koło</h2>
    <input id="f1" type="number">
    <button onclick="kolo()">Oblicz</button>
    <div id="wynik6"></div>
</div>

<div class="section">
    <h2>Paliwo (360 km)</h2>
    <input id="g1" type="number">
    <button onclick="paliwoStale()">Oblicz</button>
    <div id="wynik7"></div>
</div>

<div class="section">
    <h2>Paliwo (dowolne)</h2>
    <input id="h1" type="number">
    <input id="h2" type="number">
    <input id="h3" type="number">
    <button onclick="paliwoDowolne()">Oblicz</button>
    <div id="wynik8"></div>
</div>

<div class="section">
    <h2>Lokata</h2>
    <input id="i1" type="number">
    <button onclick="lokata()">Oblicz</button>
    <div id="wynik9"></div>
</div>

<script src="script.js"></script>
</body>
</html>
